<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Utilisateurs — Terafin</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/sidebar.css" />
</head>

<body class="app-layout">
    <div id="sidebar-container"></div>
    <button class="theme-toggle" id="theme-toggle"></button>

    <main class="main-content" id="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Gestion des Utilisateurs</h1>
                <p class="page-subtitle">Administration des comptes (Admin uniquement)</p>
            </div>
            <button class="btn btn-primary" data-modal-open="modal-add-user">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
                Créer un utilisateur
            </button>
        </div>

        <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
            <div class="kpi-card indigo">
                <div class="kpi-icon indigo">👑</div>
                <div class="kpi-value" id="count-admin">—</div>
                <div class="kpi-label">Administrateurs</div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-icon purple">🔍</div>
                <div class="kpi-value" id="count-superviseur">—</div>
                <div class="kpi-label">Superviseurs</div>
            </div>
            <div class="kpi-card cyan">
                <div class="kpi-icon cyan">👤</div>
                <div class="kpi-value" id="count-agent">—</div>
                <div class="kpi-label">Agents</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-toolbar">
                <span class="table-title" id="users-count">Utilisateurs</span>
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="search-users" placeholder="Rechercher..." />
                </div>
            </div>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Utilisateur</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Date Création</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="6" class="text-center text-muted" style="padding:40px">
                                <div class="spinner" style="margin:0 auto 12px"></div>Chargement...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal: Create User -->
    <div class="modal-overlay" id="modal-add-user">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Nouvel Utilisateur</h2>
                <button class="modal-close" data-modal-close="modal-add-user">✕</button>
            </div>
            <form id="form-add-user">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="u-email">Email *</label>
                        <input type="email" id="u-email" class="form-control" placeholder="email@exemple.com"
                            required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="u-username">Nom d'affichage (Optionnel)</label>
                        <input type="text" id="u-username" class="form-control" placeholder="Par défaut l'email" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="u-password">Mot de passe (Optionnel)</label>
                        <input type="password" id="u-password" class="form-control" placeholder="Auto-généré si vide" />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="u-role">Rôle *</label>
                        <select id="u-role" class="form-control" required>
                            <option value="agent">Agent</option>
                            <option value="superviseur">Superviseur</option>
                            <option value="admin">Administrateur</option>
                        </select>
                    </div>
                </div>
                <div id="user-form-error" class="hidden" style="
                    background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:10px;
                    padding:10px 14px;font-size:0.875rem;color:#ef4444;margin-bottom:16px;
                "></div>
                <div class="flex gap-3" style="justify-content:flex-end;">
                    <button type="button" class="btn btn-secondary" data-modal-close="modal-add-user">Annuler</button>
                    <button type="submit" class="btn btn-primary" id="submit-user">Créer l'utilisateur</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete confirm -->
    <div class="modal-overlay" id="modal-delete-user">
        <div class="modal" style="max-width:380px;text-align:center;">
            <div style="font-size:2.5rem;margin-bottom:16px;">🗑️</div>
            <h2 class="modal-title" style="margin-bottom:8px;">Supprimer cet utilisateur ?</h2>
            <p class="text-muted" style="margin-bottom:24px;font-size:0.9rem;">Cette action est irréversible.</p>
            <div class="flex gap-3" style="justify-content:center;">
                <button class="btn btn-secondary" data-modal-close="modal-delete-user">Annuler</button>
                <button class="btn btn-danger" id="confirm-delete-user">Supprimer</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        if (!AUTH.requireRole(['admin'])) { }
        THEME.init();
        renderSidebar('utilisateurs.html');
        initShared();

        let allUsers = [];
        let pendingDeleteId = null;

        async function loadUsers() {
            try {
                const data = await API.utilisateurs.list();
                allUsers = Array.isArray(data) ? data : (data?.items || []);

                document.getElementById('count-admin').textContent = allUsers.filter(u => u.role === 'admin').length;
                document.getElementById('count-superviseur').textContent = allUsers.filter(u => u.role === 'superviseur').length;
                document.getElementById('count-agent').textContent = allUsers.filter(u => u.role === 'agent').length;

                renderTable();
            } catch (err) {
                document.getElementById('users-tbody').innerHTML =
                    `<tr><td colspan="6" class="text-center" style="padding:32px;color:#ef4444">${err.message}</td></tr>`;
            }
        }

        function renderTable(search = '') {
            let filtered = allUsers;
            if (search) filtered = filtered.filter(u =>
                (u.username || '').toLowerCase().includes(search) ||
                (u.email || '').toLowerCase().includes(search) ||
                (u.role || '').toLowerCase().includes(search)
            );

            document.getElementById('users-count').textContent = `Utilisateurs (${filtered.length})`;
            const roleColors = { admin: '#6366f1', superviseur: '#8b5cf6', agent: '#06b6d4' };
            const roleEmoji = { admin: '👑', superviseur: '🔍', agent: '👤' };

            const tbody = document.getElementById('users-tbody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted" style="padding:32px">Aucun utilisateur trouvé</td></tr>';
            } else {
                tbody.innerHTML = filtered.map(u => `
                    <tr>
                        <td class="text-muted">#${u.id}</td>
                        <td>
                            <div class="flex items-center gap-2">
                                <div class="user-avatar" style="width:32px;height:32px;font-size:0.75rem;border-radius:8px;background:var(--brand-primary);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">
                                    ${(u.username || u.email || '?').charAt(0).toUpperCase()}
                                </div>
                                <div class="flex flex-col">
                                    <span class="font-bold">${u.username || '—'}</span>
                                </div>
                            </div>
                        </td>
                        <td class="text-muted">${u.email || '—'}</td>
                        <td>
                            <span class="badge" style="background:rgba(99,102,241,0.1);color:${roleColors[u.role] || '#94a3b8'}">
                                ${roleEmoji[u.role] || ''} ${roleLabel(u.role)}
                            </span>
                        </td>
                        <td class="text-muted text-xs">${formatDateTime(u.created_at)}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                            </button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('search-users').addEventListener('input', (e) => renderTable(e.target.value.toLowerCase()));

        function deleteUser(id) {
            pendingDeleteId = id;
            MODAL.open('modal-delete-user');
        }

        document.getElementById('confirm-delete-user').addEventListener('click', async () => {
            try {
                await API.utilisateurs.delete(pendingDeleteId);
                TOAST.success('Utilisateur supprimé', '');
                MODAL.close('modal-delete-user');
                loadUsers();
            } catch (err) {
                TOAST.error('Erreur', err.message);
            }
        });

        document.getElementById('form-add-user').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('user-form-error');
            const btn = document.getElementById('submit-user');
            errEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Création...';

            try {
                const payload = {
                    email: document.getElementById('u-email').value.trim(),
                    username: document.getElementById('u-username').value.trim(),
                    password: document.getElementById('u-password').value,
                    role: document.getElementById('u-role').value,
                };

                const newUser = await API.utilisateurs.create(payload);

                TOAST.success('Utilisateur créé !', `L'utilisateur ${newUser.email} a été créé.`);
                MODAL.close('modal-add-user');
                document.getElementById('form-add-user').reset();
                loadUsers();
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = "Créer l'utilisateur";
            }
        });

        loadUsers();
    </script>
</body>

</html>
