<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification OTP — Terafin</title>
  <link rel="stylesheet" href="styles/main.css?v=4" />
  <link rel="stylesheet" href="styles/auth.css?v=4" />
</head>

<body class="auth-page">

  <button class="theme-toggle-auth" id="theme-toggle" title="Changer le thème">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
    Thème
  </button>

  <div class="auth-card" role="main">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <span class="auth-logo-text">Terafin</span>
    </div>

    <h1 class="auth-title">Vérification OTP</h1>
    <p class="auth-sub" id="otp-subtitle">
      Entrez le code à 6 chiffres envoyé à votre adresse email pour finaliser la connexion.
    </p>

    <!-- OTP Digit Inputs -->
    <div class="otp-inputs" id="otp-container" role="group" aria-label="Code OTP à 6 chiffres">
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 1" />
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 2" />
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 3" />
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 4" />
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 5" />
      <input type="text" class="otp-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="Chiffre 6" />
    </div>

    <div id="otp-error" class="hidden" style="
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: .875rem;
      color: #ef4444;
      margin-bottom: 16px;
      text-align: center;
    "></div>

    <button class="auth-submit" id="otp-submit" disabled>
      <span id="otp-btn-text">Vérifier le code</span>
      <span id="otp-spinner" class="spinner hidden" style="width:18px;height:18px;border-width:2px;"></span>
    </button>

    <div class="auth-footer" style="margin-top:20px;">
      <p>Code non reçu ?
        <button class="otp-resend" id="resend-btn">Renvoyer</button>
      </p>
      <p style="margin-top:12px;">
        <a href="login.html" style="color: var(--brand-primary); text-decoration: none; font-weight: 500;">
          ← Retour à la connexion
        </a>
      </p>
    </div>
  </div>

  <script src="js/auth.js?v=4"></script>
  <script src="js/api.js?v=4"></script>
  <script src="js/shared.js?v=4"></script>
  <script>
    THEME.init();

    // If no pending email, redirect to login
    const pendingEmail = AUTH.getPendingEmail();
    if (!pendingEmail) window.location.href = 'login.html';

    // Show masked email
    const parts = pendingEmail.split('@');
    if (parts.length === 2) {
      const masked = parts[0].slice(0, 2) + '***@' + parts[1];
      document.getElementById('otp-subtitle').textContent =
        `Entrez le code à 6 chiffres envoyé à ${masked}`;
    }

    // OTP digit navigation logic
    const digits = document.querySelectorAll('.otp-digit');
    const submitBtn = document.getElementById('otp-submit');
    const errEl = document.getElementById('otp-error');

    function getOTPValue() {
      return Array.from(digits).map(d => d.value).join('');
    }

    function checkComplete() {
      const val = getOTPValue();
      submitBtn.disabled = val.length !== 6;
    }

    digits.forEach((digit, idx) => {
      digit.addEventListener('input', (e) => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val;
        if (val) {
          e.target.classList.add('filled');
          if (idx < digits.length - 1) digits[idx + 1].focus();
        } else {
          e.target.classList.remove('filled');
        }
        checkComplete();
      });

      digit.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !digit.value && idx > 0) {
          digits[idx - 1].focus();
          digits[idx - 1].value = '';
          digits[idx - 1].classList.remove('filled');
          checkComplete();
        }
        // Handle paste
        if (e.key === 'v' && (e.ctrlKey || e.metaKey)) return;
      });

      digit.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        pasted.split('').forEach((ch, i) => {
          if (digits[i]) {
            digits[i].value = ch;
            digits[i].classList.add('filled');
          }
        });
        const nextEmpty = Array.from(digits).findIndex(d => !d.value);
        (digits[nextEmpty === -1 ? 5 : nextEmpty]).focus();
        checkComplete();
      });
    });

    // Focus first digit
    digits[0].focus();

    // Submit
    async function verifyOTP() {
      const code = getOTPValue();
      errEl.classList.add('hidden');
      document.getElementById('otp-btn-text').textContent = 'Vérification...';
      document.getElementById('otp-spinner').classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        const data = await API.auth.verifierOtp(pendingEmail, code);
        AUTH.saveTokens(data.access_token, data.refresh_token);
        AUTH.clearPendingEmail();
        window.location.href = 'dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Code incorrect ou expiré. Réessayez.';
        errEl.classList.remove('hidden');
        digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
        digits[0].focus();
        document.getElementById('otp-btn-text').textContent = 'Vérifier le code';
        document.getElementById('otp-spinner').classList.add('hidden');
        submitBtn.disabled = true;
      }
    }

    submitBtn.addEventListener('click', verifyOTP);

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !submitBtn.disabled) verifyOTP();
    });

    // Resend (just re-call login)
    let resendTimer = 60;
    const resendBtn = document.getElementById('resend-btn');

    function startResendTimer() {
      resendBtn.disabled = true;
      resendBtn.textContent = `Renvoyer (${resendTimer}s)`;
      const interval = setInterval(() => {
        resendTimer--;
        resendBtn.textContent = `Renvoyer (${resendTimer}s)`;
        if (resendTimer <= 0) {
          clearInterval(interval);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Renvoyer';
          resendTimer = 60;
        }
      }, 1000);
    }

    startResendTimer();

    resendBtn.addEventListener('click', async () => {
      try {
        // We cannot resend without password — inform user to go back
        TOAST?.warning('Renvoi non disponible', 'Retournez à la connexion pour obtenir un nouveau code.');
      } catch { }
    });
  </script>
</body>

</html>
