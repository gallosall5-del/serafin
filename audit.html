<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Journal d'Audit — Terafin</title>
    <link rel="stylesheet" href="styles/main.css?v=4" />
    <link rel="stylesheet" href="styles/sidebar.css?v=4" />
    <style>
        .audit-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            transition: background var(--transition-fast);
        }

        .audit-item:last-child {
            border-bottom: none;
        }

        .audit-item:hover {
            background: var(--bg-card-hover);
        }

        .audit-action {
            display: inline-flex;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .05em;
            min-width: 64px;
            justify-content: center;
        }

        .action-CREATE {
            background: rgba(16, 185, 129, .15);
            color: #10b981;
        }

        .action-UPDATE {
            background: rgba(245, 158, 11, .15);
            color: #f59e0b;
        }

        .action-DELETE {
            background: rgba(239, 68, 68, .15);
            color: #ef4444;
        }

        .action-LOGIN {
            background: rgba(99, 102, 241, .15);
            color: #6366f1;
        }

        .audit-path {
            font-size: .875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .audit-meta {
            font-size: .75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .entity-badge {
            font-size: .65rem;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 4px;
            background: var(--bg-input);
            color: var(--text-secondary);
            margin-left: 4px;
        }
    </style>
</head>

<body class="app-layout">
    <div id="sidebar-container"></div>
    <button class="theme-toggle" id="theme-toggle"></button>

    <main class="main-content" id="main-content">
        <div class="page-header">
            <div>
                <h1 class="page-title">Journal d'Audit</h1>
                <p class="page-subtitle">Toutes les actions sensibles tracées en temps réel</p>
            </div>
            <button class="btn btn-secondary" id="refresh-audit">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10" />
                    <polyline points="1 20 1 14 7 14" />
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                </svg>
                Actualiser
            </button>
        </div>

        <!-- Audit summary -->
        <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:24px;" id="audit-kpis">
            <div class="kpi-card indigo">
                <div class="kpi-icon indigo">📝</div>
                <div class="kpi-value" id="total-actions">—</div>
                <div class="kpi-label">Total actions</div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-icon green">➕</div>
                <div class="kpi-value" id="total-creates">—</div>
                <div class="kpi-label">Créations</div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-icon purple">✏️</div>
                <div class="kpi-value" id="total-updates">—</div>
                <div class="kpi-label">Modifications</div>
            </div>
            <div class="kpi-card rose">
                <div class="kpi-icon rose">🗑️</div>
                <div class="kpi-value" id="total-deletes">—</div>
                <div class="kpi-label">Suppressions</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="table-container">
            <div class="table-toolbar">
                <span class="table-title">Entrées d'audit</span>
                <div class="flex gap-2">
                    <select id="filter-action" class="form-control"
                        style="width:auto;padding:7px 12px;font-size:.8rem;">
                        <option value="">Toutes les actions</option>
                        <option value="CREATE">CREATE</option>
                        <option value="UPDATE">UPDATE</option>
                        <option value="DELETE">DELETE</option>
                        <option value="LOGIN">LOGIN</option>
                    </select>
                    <div class="search-box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" id="search-audit" placeholder="Rechercher utilisateur, entité..." />
                    </div>
                </div>
            </div>

            <div id="audit-list">
                <div style="text-align:center;padding:40px" class="text-muted">
                    <div class="spinner" style="margin:0 auto 12px"></div>Chargement du journal...
                </div>
            </div>
            <div class="pagination" id="audit-pagination"></div>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="js/auth.js?v=4"></script>
    <script src="js/api.js?v=4"></script>
    <script src="js/shared.js?v=4"></script>
    <script src="js/sidebar.js?v=4"></script>
    <script>
        if (!AUTH.requireRole(['admin', 'superviseur'])) { }
        THEME.init();
        renderSidebar('audit.html');
        initShared();

        let allLogs = [];
        let currentPage = 1;
        const PAGE_SIZE = 20;

        async function loadAudit() {
            try {
                // Fetch stats and logs
                const [stats, data] = await Promise.all([
                    API.audit.stats().catch(() => ({})),
                    API.audit.logs(null, null, 1000).catch(() => [])
                ]);

                allLogs = Array.isArray(data) ? data : (data?.items || []);

                // Update KPIs from API stats or manual count
                document.getElementById('total-actions').textContent = stats.total_logs || allLogs.length;
                document.getElementById('total-creates').textContent = stats.count_create || allLogs.filter(l => l.action === 'CREATE').length;
                document.getElementById('total-updates').textContent = stats.count_update || allLogs.filter(l => l.action === 'UPDATE').length;
                document.getElementById('total-deletes').textContent = stats.count_delete || allLogs.filter(l => l.action === 'DELETE').length;

                renderList();
            } catch (err) {
                document.getElementById('audit-list').innerHTML =
                    `<p style="color:#ef4444;text-align:center;padding:32px">${err.message}</p>`;
            }
        }

        function renderList() {
            const actionF = document.getElementById('filter-action').value;
            const search = document.getElementById('search-audit').value.toLowerCase();

            let filtered = allLogs;
            if (actionF) filtered = filtered.filter(l => l.action === actionF);
            if (search) filtered = filtered.filter(l =>
                (l.username || '').toLowerCase().includes(search) ||
                (l.entity_type || '').toLowerCase().includes(search) ||
                (l.description || '').toLowerCase().includes(search) ||
                (String(l.entity_id || '')).includes(search)
            );

            const total = filtered.length;
            const pages = Math.ceil(total / PAGE_SIZE);
            if (currentPage > pages) currentPage = 1;
            const slice = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

            const container = document.getElementById('audit-list');
            if (slice.length === 0) {
                container.innerHTML = '<p class="text-muted text-center" style="padding:32px">Aucune entrée trouvée</p>';
            } else {
                container.innerHTML = slice.map(log => {
                    const action = log.action || 'INFO';
                    const entity = log.entity_type || '';
                    const entityId = log.entity_id ? `#${log.entity_id}` : '';
                    const username = log.username || 'Système';
                    const timestamp = log.timestamp || log.created_at;

                    return `
                        <div class="audit-item">
                            <span class="audit-action action-${action}">${action}</span>
                            <div style="flex:1;min-width:0;">
                                <div class="audit-path truncate">
                                    ${log.description || 'Action effectuée'}
                                    ${entity ? `<span class="entity-badge">${entity} ${entityId}</span>` : ''}
                                </div>
                                <div class="audit-meta">
                                    👤 <strong>${username}</strong>
                                    · ${formatDateTime(timestamp)}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            const pag = document.getElementById('audit-pagination');
            if (pages <= 1) { pag.innerHTML = ''; return; }
            let html = `<button class="pagination-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
            for (let i = 1; i <= Math.min(pages, 10); i++) html += `<button class="pagination-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            if (pages > 10) html += `<span class="text-muted text-sm" style="padding:0 8px">... ${pages}</span>`;
            html += `<button class="pagination-btn" onclick="changePage(${currentPage + 1})" ${currentPage === pages ? 'disabled' : ''}>›</button>`;
            pag.innerHTML = html;
        }

        function changePage(p) { currentPage = p; renderList(); }
        document.getElementById('filter-action').addEventListener('change', () => { currentPage = 1; renderList(); });
        document.getElementById('search-audit').addEventListener('input', () => { currentPage = 1; renderList(); });
        document.getElementById('refresh-audit').addEventListener('click', () => {
            document.getElementById('audit-list').innerHTML = '<div style="text-align:center;padding:32px" class="text-muted"><div class="spinner" style="margin:0 auto 12px"></div>Actualisation...</div>';
            loadAudit();
        });

        loadAudit();
    </script>
</body>

</html>
