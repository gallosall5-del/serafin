<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Terafin</title>
    <link rel="stylesheet" href="styles/main.css?v=3" />
    <link rel="stylesheet" href="styles/sidebar.css?v=3" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .welcome-banner {
            background: var(--brand-primary);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::after {
            content: '';
            position: absolute;
            right: -20px;
            top: -30px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, .06);
            border-radius: 50%;
        }

        .welcome-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .welcome-sub {
            color: rgba(255, 255, 255, .75);
            font-size: .9rem;
            margin-top: 4px;
        }

        .donut-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .donut-center {
            position: absolute;
            text-align: center;
            pointer-events: none;
        }

        .donut-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .donut-sub {
            font-size: .7rem;
            color: var(--text-secondary);
        }

        .chart-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .8rem;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .recent-table tr td:first-child {
            font-weight: 500;
        }

        .activity-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: .85rem;
        }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-size: .875rem;
            font-weight: 500;
        }

        .activity-time {
            font-size: .75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
    </style>
</head>

<body class="app-layout">

    <!-- Sidebar placeholder -->
    <div id="sidebar-container"></div>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-toggle" title="Changer le thème">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
    </button>

    <main class="main-content" id="main-content">

        <!-- Welcome Banner -->
        <div class="welcome-banner">
            <p class="welcome-text" id="welcome-msg">Bonjour 👋</p>
            <p class="welcome-sub" id="welcome-date"></p>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-grid" id="kpi-grid">
            <!-- Skeleton -->
            <div class="kpi-card">
                <div class="skeleton" style="height:100px"></div>
            </div>
            <div class="kpi-card">
                <div class="skeleton" style="height:100px"></div>
            </div>
            <div class="kpi-card">
                <div class="skeleton" style="height:100px"></div>
            </div>
            <div class="kpi-card">
                <div class="skeleton" style="height:100px"></div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="charts-grid">
            <!-- Line chart -->
            <div class="chart-card">
                <div class="chart-header">
                    <span class="chart-title">Évolution des Crédits</span>
                    <select id="chart-period" class="form-control" style="width:auto;padding:6px 12px;font-size:.8rem;">
                        <option value="12">12 derniers mois</option>
                        <option value="6">6 derniers mois</option>
                        <option value="3">3 derniers mois</option>
                    </select>
                </div>
                <canvas id="credits-chart" height="100"></canvas>
            </div>

            <!-- Donut chart -->
            <div class="chart-card">
                <div class="chart-header">
                    <span class="chart-title">Répartition des Statuts</span>
                </div>
                <div class="donut-container">
                    <canvas id="status-chart" width="200" height="200"></canvas>
                    <div class="donut-center">
                        <div class="donut-value" id="donut-total">—</div>
                        <div class="donut-sub">Crédits</div>
                    </div>
                </div>
                <div class="chart-legend" id="status-legend"></div>
            </div>
        </div>

        <!-- Bottom row: recent credits + activity -->
        <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:20px;" class="bottom-grid">
            <!-- Recent Credits Table -->
            <div class="table-container">
                <div class="table-toolbar">
                    <span class="table-title">Crédits Récents</span>
                    <a href="credits.html" class="btn btn-secondary btn-sm">Voir tout →</a>
                </div>
                <div style="overflow-x:auto;">
                    <table id="recent-credits-table">
                        <thead>
                            <tr>
                                <th>Client</th>
                                <th>Montant</th>
                                <th>Taux</th>
                                <th>Statut</th>
                            </tr>
                        </thead>
                        <tbody id="recent-credits-body">
                            <tr>
                                <td colspan="4" class="text-center text-muted" style="padding:24px">Chargement...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Quick Stats / Activity -->
            <div class="card">
                <div class="flex items-center justify-between mb-4">
                    <span class="chart-title">Activité Récente</span>
                </div>
                <div id="activity-list">
                    <p class="text-muted text-sm text-center" style="padding:16px">Chargement...</p>
                </div>
            </div>
        </div>

    </main>

    <script src="js/auth.js?v=3"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/shared.js?v=3"></script>
    <script src="js/sidebar.js?v=3"></script>
    <script>
        // Guard
        if (!AUTH.requireAuth()) { /* redirect handled */ }

        // Init
        THEME.init();
        renderSidebar('dashboard.html');
        initShared();

        // Welcome message
        const user = AUTH.getCurrentUser();
        document.getElementById('welcome-msg').textContent = `Bonjour, ${user?.username || ''} 👋`;
        document.getElementById('welcome-date').textContent = new Date().toLocaleDateString('fr-FR', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });

        // ── Chart.js theme helper ──
        function getChartColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            return {
                grid: isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)',
                text: isDark ? '#94a3b8' : '#4b5580',
            };
        }

        let lineChart, donutChart;

        function initCharts(monthlyData, statusData) {
            const colors = getChartColors();
            const chartOpts = { color: colors.text, font: { family: 'Inter', size: 12 } };

            // ── Line Chart ──
            const labels = monthlyData.map(d => d.mois || d.month || d.label);
            const values = monthlyData.map(d => d.total || d.count || d.montant || d.montant || 0);

            const ctx1 = document.getElementById('credits-chart').getContext('2d');
            const gradient = ctx1.createLinearGradient(0, 0, 0, 200);
            gradient.addColorStop(0, 'rgba(99,102,241,.35)');
            gradient.addColorStop(1, 'rgba(99,102,241,0)');

            lineChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Crédits',
                        data: values,
                        borderColor: '#6366f1',
                        backgroundColor: gradient,
                        borderWidth: 2.5,
                        pointBackgroundColor: '#6366f1',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: .4,
                    }],
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
                    scales: {
                        x: { grid: { color: colors.grid }, ticks: chartOpts },
                        y: { grid: { color: colors.grid }, ticks: { ...chartOpts, callback: v => v.toLocaleString('fr-FR') } },
                    },
                },
            });

            // ── Donut Chart ──
            const statusColors = {
                'active': '#10b981',
                'pending': '#f59e0b',
                'overdue': '#ef4444',
                'completed': '#3b82f6',
                // fallback for french labels if any
                'actif': '#10b981',
                'en attente': '#f59e0b',
                'en retard': '#ef4444',
                'termine': '#3b82f6'
            };
            const statusLabels = Object.keys(statusData);
            const statusValues = Object.values(statusData);
            const total = statusValues.reduce((a, b) => a + b, 0);

            document.getElementById('donut-total').textContent = total;

            const ctx2 = document.getElementById('status-chart').getContext('2d');
            donutChart = new Chart(ctx2, {
                type: 'doughnut',
                data: {
                    labels: statusLabels,
                    datasets: [{
                        data: statusValues,
                        backgroundColor: statusLabels.map(l => statusColors[l] || '#6366f1'),
                        borderWidth: 0,
                        hoverOffset: 8,
                    }],
                },
                options: {
                    responsive: false,
                    cutout: '72%',
                    plugins: { legend: { display: false } },
                },
            });

            // Legend
            const legend = document.getElementById('status-legend');
            legend.innerHTML = statusLabels.map((l, i) => `
                <div class="legend-item">
                    <div class="legend-dot" style="background:${statusColors[l] || '#6366f1'}"></div>
                    <span class="text-muted">${l.charAt(0).toUpperCase() + l.slice(1)}</span>
                    <span class="font-semibold" style="margin-left:auto">${statusValues[i]}</span>
                </div>
            `).join('');
        }

        // ── Load Dashboard Data ──
        async function loadDashboard() {
            try {
                const [statsData, chartsData, creditsData, auditData] = await Promise.all([
                    API.dashboard.stats().catch(() => null),
                    API.dashboard.charts().catch(() => null),
                    API.credits.list().catch(() => []),
                    API.audit.logs(null, null, 5).catch(() => []),
                ]);

                const kpis = statsData || {};

                // KPI Grid
                document.getElementById('kpi-grid').innerHTML = `
                    <div class="kpi-card indigo fade-in">
                        <div class="kpi-icon indigo">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                            </svg>
                        </div>
                        <div class="kpi-value" id="kpi-actifs">0</div>
                        <div class="kpi-label">Crédits Actifs</div>
                    </div>
                    <div class="kpi-card purple fade-in" style="animation-delay:.1s">
                        <div class="kpi-icon purple">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                            </svg>
                        </div>
                        <div class="kpi-value" id="kpi-clients">0</div>
                        <div class="kpi-label">Total Clients</div>
                    </div>
                    <div class="kpi-card cyan fade-in" style="animation-delay:.2s">
                        <div class="kpi-icon cyan">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                        </div>
                        <div class="kpi-value" id="kpi-montant">0</div>
                        <div class="kpi-label">Montant total (CFA)</div>
                    </div>
                    <div class="kpi-card rose fade-in" style="animation-delay:.3s">
                        <div class="kpi-icon rose">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </div>
                        <div class="kpi-value" id="kpi-retards">0</div>
                        <div class="kpi-label">En Retard</div>
                    </div>
                `;

                // Animate counters — using REAL backend field names
                animateCounter(document.getElementById('kpi-actifs'), kpis.active_credits || 0);
                animateCounter(document.getElementById('kpi-clients'), kpis.total_clients || 0);
                animateCounter(document.getElementById('kpi-montant'), kpis.total_lent || 0, 1200);
                animateCounter(document.getElementById('kpi-retards'), kpis.overdue_credits || 0);

                // ── Charts — from /dashboard/charts ──
                const evolutionData = chartsData?.evolution_prets || [];
                const repartitionData = chartsData?.repartition_statut || [];
                const tauxRecouvrement = chartsData?.taux_recouvrement || 0;

                const monthlyForChart = evolutionData.length > 0 ? evolutionData : generateFakeMonthly();

                const statusMap = {};
                repartitionData.forEach(r => {
                    const label = r.statut?.toString() || '?';
                    statusMap[label] = r.nombre || 0;
                });
                if (Object.keys(statusMap).length === 0) {
                    Object.assign(statusMap, { active: 0, pending: 0, overdue: 0, completed: 0 });
                }

                initCharts(monthlyForChart, statusMap);

                // Recent credits table
                const credits = Array.isArray(creditsData) ? creditsData : [];
                const tbody = document.getElementById('recent-credits-body');
                if (credits.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted" style="padding:24px">Aucun crédit trouvé</td></tr>';
                } else {
                    tbody.innerHTML = credits.slice(0, 5).map(c => `
                        <tr>
                            <td>Client #${c.client_id}</td>
                            <td>${formatCurrency(c.montant)}</td>
                            <td>${c.taux ? c.taux + '%' : '—'}</td>
                            <td>${creditStatusBadge(c.statut)}</td>
                        </tr>
                    `).join('');
                }

                // Activity from audit logs
                const logs = Array.isArray(auditData) ? auditData : [];
                const activityHtml = logs.length > 0
                    ? logs.slice(0, 5).map(log => {
                        const actionIcons = { CREATE: '✅', UPDATE: '✏️', DELETE: '🗑️' };
                        return `
                        <div class="activity-item">
                            <div class="activity-icon" style="background:rgba(99,102,241,.12)">${actionIcons[log.action] || '📝'}</div>
                            <div class="activity-content">
                                <div class="activity-title">${log.action} ${log.entity_type || ''} #${log.entity_id || '—'}</div>
                                <div class="activity-time">👤 ${log.username || 'Système'} · ${formatDateTime(log.timestamp)}</div>
                            </div>
                        </div>`;
                    }).join('')
                    : '<p class="text-muted text-sm text-center" style="padding:16px">Aucune activité récente</p>';

                document.getElementById('activity-list').innerHTML = `
                    ${tauxRecouvrement > 0 ? `
                    <div style="margin-bottom:12px;padding:12px;background:rgba(16,185,129,.1);border-radius:10px;">
                        <div class="text-xs text-muted mb-1">Taux de recouvrement</div>
                        <div style="font-size:1.4rem;font-weight:800;color:#10b981">${tauxRecouvrement}%</div>
                    </div>` : ''}
                    ${activityHtml}
                `;

            } catch (err) {
                console.error('Dashboard load error:', err);
            }
        }

        function generateFakeMonthly() {
            const months = ['Août', 'Sep', 'Oct', 'Nov', 'Déc', 'Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil'];
            return months.map(m => ({ mois: m, montant: Math.floor(5 + Math.random() * 20) * 100000 }));
        }

        loadDashboard();

        // Re-draw charts on theme change
        const observer = new MutationObserver(() => {
            if (lineChart) {
                const c = getChartColors();
                lineChart.options.scales.x.grid.color = c.grid;
                lineChart.options.scales.y.grid.color = c.grid;
                lineChart.update();
            }
        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    </script>
</body>

</html>
